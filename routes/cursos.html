<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cursos — SaibaPlus</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="nav-root"></div>

<div class="cat-hero" id="cat-hero">
  <div class="container">
    <nav class="breadcrumb">
      <a href="index.html">Início</a>
      <span>›</span>
      <span id="bread-cat">Categoria</span>
    </nav>
    <div class="cat-hero-inner">
      <div class="cat-hero-icon" id="cat-icon">📚</div>
      <div>
        <h1 id="cat-title">Cursos</h1>
        <p id="cat-desc">Explore os cursos disponíveis</p>
      </div>
    </div>
  </div>
</div>

<section class="section-gap">
  <div class="container">
    <div class="section-divider"><div class="bar" id="divider-bar"></div></div>
    <h2 class="section-title" id="courses-heading">Todos os Cursos</h2>
    <p class="section-sub" id="courses-sub">Carregando...</p>
    <div class="courses-grid" id="courses-grid">
      <p style="color:var(--gray-400)">Carregando cursos...</p>
    </div>
  </div>
</section>

<div id="footer-root"></div>

<script src="/routes/js/app.js"></script>
<script src="/routes/js/components.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = buildNavbar();
  document.getElementById('footer-root').innerHTML = buildFooter();

  const params = new URLSearchParams(window.location.search);
  const catId  = params.get('cat');

  // Carrega info da categoria
  apiFetch('categorias').then(res => {
    const cat = res.data.find(c => c.id == catId);
    if (!cat) return;
    document.title = `${cat.nome} — SaibaPlus`;
    document.getElementById('cat-hero').style.background =
      `linear-gradient(120deg, ${cat.cor} 0%, color-mix(in srgb, ${cat.cor} 70%, black) 100%)`;
    document.getElementById('bread-cat').textContent  = cat.nome;
    document.getElementById('cat-icon').textContent   = cat.icone;
    document.getElementById('cat-title').textContent  = cat.nome;
    document.getElementById('cat-desc').textContent   = cat.descricao || '';
    document.getElementById('courses-heading').textContent = `Cursos de ${cat.nome}`;
    document.getElementById('divider-bar').style.background = cat.cor;
  });

  // Carrega cursos da categoria
  apiFetch(`cursos?categoria_id=${catId}`).then(res => {
    const grid = document.getElementById('courses-grid');
    const sub  = document.getElementById('courses-sub');
    grid.innerHTML = '';

    if (res.data.length === 0) {
      sub.textContent = '0 cursos disponíveis';
      grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:4rem 0;color:var(--gray-400)">
          <div style="font-size:3rem">😕</div>
          <h3 style="color:var(--gray-600);margin:.75rem 0 .5rem">Nenhum curso nesta categoria ainda</h3>
          <a href="index.html" style="color:var(--indigo-500);font-weight:600">← Voltar ao início</a>
        </div>`;
      return;
    }

    sub.textContent = `${res.data.length} curso(s) disponível(is)`;
    res.data.forEach(c => {
      grid.innerHTML += `
        <div class="course-card">
          <img class="course-card-img"
               src="${c.imagem_url || 'https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=600&q=80'}"
               alt="${c.titulo}" loading="lazy"
               onclick="location.href='detalhe.html?id=${c.id}'"
               title="Ver detalhes"/>
          <div class="course-card-body">
            <span class="level-badge level-${c.nivel}">${levelLabel(c.nivel)}</span>
            <h3>${c.titulo}</h3>
            <p>${c.descricao || ''}</p>
            <div class="course-meta">
              <span>⏱ ${c.carga_horaria}</span>
              <span>👤 ${c.instrutor || ''}</span>
            </div>
            <div class="course-meta">
              <span>👥 ${Number(c.matriculas).toLocaleString('pt-BR')} matrículas</span>
            </div>
            <div class="price-row">
              <span class="price">${formatPrice(c.preco)}</span>
              <button class="btn-add-cart"
                onclick="addToCart(${c.id}, '${c.titulo.replace(/'/g,"\\'")}', ${c.preco}, '${c.imagem_url || ''}')">
                + Selecionar
              </button>
            </div>
          </div>
        </div>`;
    });
  }).catch(() => {
    document.getElementById('courses-grid').innerHTML =
      '<p style="color:#EF4444">Erro ao carregar cursos.</p>';
  });
</script>
</body>
</html>
