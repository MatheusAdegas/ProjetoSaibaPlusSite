<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — SaibaPlus</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="nav-root"></div>

<div class="form-page">
  <div class="container" style="max-width:460px">
    <div class="form-card">
      <div style="text-align:center;margin-bottom:2rem">
        <div style="font-size:2.5rem;margin-bottom:.5rem">🎓</div>
        <h2>Entrar na SaibaPlus</h2>
        <p class="form-sub">Use seu login ou e-mail cadastrado</p>
      </div>

      <div id="login-error" style="display:none;background:#FEE2E2;color:#991B1B;padding:.75rem 1rem;border-radius:6px;font-size:.875rem;margin-bottom:1rem"></div>

      <div style="display:flex;flex-direction:column;gap:1.25rem">
        <div class="form-group">
          <label for="login">Login ou E-mail <span>*</span></label>
          <input class="form-control" type="text" id="login" placeholder="seu_login ou email@exemplo.com"/>
        </div>
        <div class="form-group">
          <label for="senha">Senha <span>*</span></label>
          <input class="form-control" type="password" id="senha" placeholder="Sua senha"/>
        </div>
        <button class="btn-submit" id="btn-login" onclick="fazerLogin()" style="width:100%">
          Entrar →
        </button>
      </div>

      <p style="text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--gray-400)">
        Não tem conta?
        <a href="cadastro.html" style="color:var(--indigo-500);font-weight:600">Cadastre-se grátis</a>
      </p>
    </div>
  </div>
</div>

<div id="footer-root"></div>

<script src="/routes/js/app.js"></script>
<script src="/routes/js/components.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = buildNavbar();
  document.getElementById('footer-root').innerHTML = buildFooter();

  // Se já estiver logado, redireciona
  if (isLoggedIn()) window.location.href = 'matricula.html';

  // Enter no campo senha dispara login
  document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin();
  });

  async function fazerLogin() {
    const loginVal = document.getElementById('login').value.trim();
    const senhaVal = document.getElementById('senha').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('btn-login');

    errEl.style.display = 'none';

    if (!loginVal || !senhaVal) {
      errEl.textContent    = 'Preencha login e senha.';
      errEl.style.display  = 'block';
      return;
    }

    btn.textContent  = 'Entrando...';
    btn.disabled     = true;

    const res = await apiPost('auth/login', { login: loginVal, senha: senhaVal });

    btn.textContent = 'Entrar →';
    btn.disabled    = false;

    if (res.success) {
      localStorage.setItem('saibaplus_token',   res.token);
      localStorage.setItem('saibaplus_usuario', JSON.stringify(res.usuario));
      showToast(`Bem-vindo(a), ${res.usuario.nome.split(' ')[0]}!`, 'success');
      setTimeout(() => window.location.href = 'matricula.html', 800);
    } else {
      errEl.textContent   = res.message || 'Credenciais inválidas.';
      errEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
