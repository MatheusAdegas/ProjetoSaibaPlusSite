<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro Enviado — SaibaPlus</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="nav-root"></div>

<div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="background:white;border-radius:20px;padding:3rem 2.5rem;max-width:600px;width:100%;box-shadow:var(--shadow-lg);text-align:center">
    <div style="font-size:4rem;margin-bottom:1rem">🎉</div>
    <h2 style="font-family:'Sora',sans-serif;color:var(--indigo-900);margin-bottom:.5rem">Cadastro Realizado!</h2>
    <p style="color:var(--gray-600);margin-bottom:2rem">Sua conta foi criada com sucesso. Veja abaixo os dados enviados pelo formulário (método GET):</p>

    <div id="params-table" style="text-align:left;background:var(--gray-50);border-radius:12px;padding:1.25rem;margin-bottom:2rem;font-size:.85rem;overflow:auto"></div>

    <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
      <a href="index.html" class="btn-primary" style="text-decoration:none;padding:.75rem 1.75rem">← Voltar ao início</a>
      <a href="matricula.html" style="display:inline-flex;align-items:center;gap:.4rem;border:2px solid var(--indigo-200);color:var(--indigo-500);border-radius:50px;padding:.75rem 1.75rem;font-weight:600;font-size:.875rem">Ver seleção 🛒</a>
    </div>
  </div>
</div>

<div id="footer-root"></div>

<script src="/routes/js/app.js"></script>
<script src="/routes/js/components.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = buildNavbar();
  document.getElementById('footer-root').innerHTML = buildFooter();

  const params = new URLSearchParams(window.location.search);
  const labels = {
    nome:'Nome', cpf:'CPF', nascimento:'Nascimento', telefone:'Telefone',
    escolaridade:'Escolaridade', area_interesse:'Área de Interesse',
    email:'E-mail', login:'Login', endereco:'Endereço',
    bairro:'Bairro', cidade:'Cidade', estado:'Estado', cep:'CEP'
  };

  let html = '<table style="width:100%;border-collapse:collapse">';
  for (const [key, val] of params.entries()) {
    if (key === 'senha' || key === 'confirma_senha') continue; // never display passwords
    const label = labels[key] || key;
    html += `<tr style="border-bottom:1px solid var(--gray-200)">
      <td style="padding:.5rem .75rem;font-weight:600;color:var(--gray-600);white-space:nowrap">${label}</td>
      <td style="padding:.5rem .75rem;color:var(--gray-800)">${val || '<em style="color:var(--gray-400)">não informado</em>'}</td>
    </tr>`;
  }
  html += '</table>';

  if([...params.entries()].length === 0) {
    html = '<p style="color:var(--gray-400);text-align:center">Nenhum parâmetro encontrado na URL.</p>';
  }
  document.getElementById('params-table').innerHTML = html;
</script>
</body>
</html>
