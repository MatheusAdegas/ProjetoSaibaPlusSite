<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seleção de Matrícula — SaibaPlus</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="nav-root"></div>

<div class="cart-page">
  <div class="container">

    <nav class="breadcrumb" style="margin-bottom:1.5rem;color:var(--gray-400)">
      <a href="index.html" style="color:var(--indigo-500)">Início</a>
      <span>›</span>
      <span>Seleção para Matrícula</span>
    </nav>

    <div style="margin-bottom:2rem">
      <div class="section-divider"><div class="bar"></div></div>
      <h2 class="section-title">🎓 Minha Seleção</h2>
      <p class="section-sub" id="cart-subtitle">Cursos selecionados para matrícula</p>
    </div>

    <div id="cart-content"></div>

  </div>
</div>

<!-- MODAL: confirmar remoção -->
<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <h3>Remover curso?</h3>
    <p id="del-modal-msg">Tem certeza que deseja remover este curso da seleção?</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Manter</button>
      <button class="btn-confirm-del" onclick="confirmRemove()">Sim, remover</button>
    </div>
  </div>
</div>

<!-- MODAL: matrícula finalizada -->
<div class="modal-overlay" id="fin-modal">
  <div class="modal">
    <h3>🎉 Matrícula Finalizada!</h3>
    <p>Sua matrícula foi enviada com sucesso. Em breve você receberá um e-mail de confirmação.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('fin-modal').classList.remove('active')">Fechar</button>
      <button class="btn-enroll" style="flex:1;border-radius:25px" onclick="window.location.href='index.html'">Voltar ao início</button>
    </div>
  </div>
</div>

<div id="footer-root"></div>

<script src="js/app.js"></script>
<script src="js/components.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = buildNavbar();
  document.getElementById('footer-root').innerHTML = buildFooter();

  // Proteção de rota — redireciona se não estiver logado
  if (!isLoggedIn()) {
    showToast('Faça login para ver sua seleção.', 'info');
    setTimeout(() => window.location.href = 'login.html', 1000);
  }

  let pendingRemoveId = null;

  function renderCart() {
    const cart     = getCart();
    const content  = document.getElementById('cart-content');
    const subtitle = document.getElementById('cart-subtitle');

    if (cart.length === 0) {
      subtitle.textContent = '0 cursos selecionados';
      content.innerHTML = `
        <div class="empty-cart">
          <span>🛒</span>
          <h3>Nenhum curso selecionado ainda</h3>
          <p>Explore nossas categorias e escolha os cursos que deseja cursar.</p>
          <br/>
          <a href="index.html">← Explorar cursos</a>
        </div>`;
      return;
    }

    let totalQty   = 0;
    let totalValor = 0;
    cart.forEach(item => {
      totalQty   += item.qty;
      totalValor += item.preco * item.qty;
    });

    subtitle.textContent = `${cart.length} curso(s) · ${totalQty} vaga(s)`;

    let rows = '';
    cart.forEach(item => {
      const img = item.imagem ||
        'https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=600&q=80';
      rows += `
        <tr id="row-${item.id}">
          <td data-label="Curso">
            <div style="display:flex;align-items:center;gap:.85rem">
              <img class="cart-img" src="${img}" alt="${item.titulo}"/>
              <div>
                <div class="cart-course-name">${item.titulo}</div>
                <div class="cart-course-desc">${formatPrice(item.preco)} por vaga</div>
              </div>
            </div>
          </td>
          <td data-label="Valor unitário" style="font-weight:600;color:var(--indigo-900)">
            ${formatPrice(item.preco)}
          </td>
          <td data-label="Vagas / Participantes">
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
              <input class="qty-input" type="number" min="1" value="${item.qty}"
                     onchange="setQty(${item.id}, this.value)"/>
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            </div>
          </td>
          <td data-label="Subtotal" style="font-weight:700;color:var(--indigo-900)">
            ${formatPrice(item.preco * item.qty)}
          </td>
          <td data-label="Remover">
            <button class="btn-remove" onclick="askRemove(${item.id}, '${item.titulo.replace(/'/g,"\\'")}')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3,6 5,6 21,6"/>
                <path d="M19,6l-1,14H6L5,6"/>
                <path d="M10,11v6M14,11v6M9,6V4h6v2"/>
              </svg>
            </button>
          </td>
        </tr>`;
    });

    content.innerHTML = `
      <div class="cart-table-wrapper">
        <table class="cart-table">
          <thead>
            <tr>
              <th>Curso</th>
              <th>Valor Unit.</th>
              <th>Vagas / Participantes</th>
              <th>Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <div class="cart-summary">
          <h3>Resumo</h3>
          <div class="summary-row">
            <span>Cursos</span><span>${cart.length}</span>
          </div>
          <div class="summary-row">
            <span>Total de vagas</span><span>${totalQty}</span>
          </div>
          <div class="summary-row total">
            <span>Total</span><span>${formatPrice(totalValor)}</span>
          </div>
          <button class="btn-finalize" onclick="finalizeEnrollment()">
            Finalizar Matrícula ✓
          </button>
          <a href="index.html" style="display:block;text-align:center;margin-top:.75rem;font-size:.85rem;color:var(--gray-400)">
            ← Continuar navegando
          </a>
        </div>
      </div>`;
  }

  function changeQty(id, delta) {
    const cart = getCart();
    const item = cart.find(i => i.id === id);
    if (!item) return;
    const newQty = item.qty + delta;
    if (newQty <= 0) { askRemove(id, item.titulo); return; }
    item.qty = newQty;
    saveCart(cart);
    renderCart();
  }

  function setQty(id, val) {
    const qty = parseInt(val);
    const cart = getCart();
    const item = cart.find(i => i.id === id);
    if (!item) return;
    if (isNaN(qty) || qty <= 0) { askRemove(id, item.titulo); return; }
    item.qty = qty;
    saveCart(cart);
    renderCart();
  }

  function askRemove(id, titulo) {
    pendingRemoveId = id;
    document.getElementById('del-modal-msg').textContent =
      `Tem certeza que deseja remover "${titulo}" da sua seleção?`;
    document.getElementById('del-modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('del-modal').classList.remove('active');
    pendingRemoveId = null;
    renderCart();
  }

  function confirmRemove() {
    if (!pendingRemoveId) return;
    saveCart(getCart().filter(i => i.id !== pendingRemoveId));
    pendingRemoveId = null;
    document.getElementById('del-modal').classList.remove('active');
    showToast('🗑 Curso removido', 'info');
    renderCart();
  }

  function finalizeEnrollment() {
    if (getCart().length === 0) {
      showToast('Selecione ao menos um curso.', 'error'); return;
    }
    localStorage.removeItem('saibaplus_cart');
    updateCartBadge();
    document.getElementById('fin-modal').classList.add('active');
  }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) { overlay.classList.remove('active'); renderCart(); }
    });
  });

  renderCart();
</script>
</body>
</html>
