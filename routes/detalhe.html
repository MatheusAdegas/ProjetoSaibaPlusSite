<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalhes do Curso — SaibaPlus</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="nav-root"></div>
<div id="page-content">
  <div style="text-align:center;padding:5rem;color:var(--gray-400)">Carregando...</div>
</div>
<div id="footer-root"></div>

<script src="/routes/js/app.js"></script>
<script src="/routes/js/components.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = buildNavbar();
  document.getElementById('footer-root').innerHTML = buildFooter();

  const id = new URLSearchParams(window.location.search).get('id');

  apiFetch(`cursos/${id}`).then(res => {
    const c   = res.data;
    const cat = c.categoria || {};
    document.title = `${c.titulo} — SaibaPlus`;

    document.getElementById('page-content').innerHTML = `
      <section class="detail-hero">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">Início</a> <span>›</span>
            <a href="cursos.html?cat=${cat.id}">${cat.nome || 'Cursos'}</a> <span>›</span>
            <span>${c.titulo}</span>
          </nav>
          <div class="detail-grid">
            <div>
              <div class="detail-badges">
                <span class="detail-badge">${cat.icone || ''} ${cat.nome || ''}</span>
                <span class="detail-badge">🎓 ${levelLabel(c.nivel)}</span>
                <span class="detail-badge">🖥 Online</span>
              </div>
              <h1>${c.titulo}</h1>
              <p style="color:var(--indigo-200);font-size:1rem;line-height:1.6">${c.descricao || ''}</p>
              <div class="detail-meta-row">
                <span>⏱ ${c.carga_horaria}</span>
                <span>👤 ${c.instrutor || ''}</span>
                <span>👥 ${Number(c.matriculas).toLocaleString('pt-BR')} alunos</span>
              </div>
            </div>
            <div>
              <img src="${c.imagem_url || 'https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=600&q=80'}"
                   alt="${c.titulo}" style="border-radius:10px;width:100%;height:260px;object-fit:cover"/>
            </div>
          </div>
        </div>
      </section>

      <div class="detail-content">
        <div class="container">
          <div class="content-grid">
            <div>
              <div class="detail-section">
                <h2>📋 Sobre o Curso</h2>
                <p>${c.descricao || ''}</p>
              </div>
              <div class="detail-section">
                <h2>✅ Pré-requisitos</h2>
                <ul>
                  ${c.nivel === 'iniciante'
                    ? '<li>Nenhum pré-requisito técnico</li><li>Vontade de aprender</li>'
                    : '<li>Conhecimentos básicos na área</li><li>Familiaridade com as ferramentas</li>'}
                </ul>
              </div>
            </div>
            <div class="detail-sidebar">
              <div class="price-big">${formatPrice(c.preco)}</div>
              <p style="color:var(--gray-400);font-size:.8rem;margin:.25rem 0 1rem">Acesso vitalício após matrícula</p>
              <button class="btn-enroll"
                onclick="addToCart(${c.id}, '${c.titulo.replace(/'/g,"\\'")}', ${c.preco}, '${c.imagem_url || ''}'); showToast('Adicionado!','success')">
                🎓 Selecionar para Matrícula
              </button>
              <div class="instructor" style="display:flex;align-items:center;gap:.75rem;padding:1rem 0;border-top:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200);margin:1rem 0">
                <div class="instructor-avatar">👨‍🏫</div>
                <div>
                  <div style="font-weight:600;font-size:.9rem;color:var(--indigo-900)">${c.instrutor || ''}</div>
                  <div style="font-size:.78rem;color:var(--gray-400)">Instrutor(a)</div>
                </div>
              </div>
              <ul class="sidebar-list">
                <li><span>Carga horária</span><strong>${c.carga_horaria}</strong></li>
                <li><span>Nível</span><strong>${levelLabel(c.nivel)}</strong></li>
                <li><span>Modalidade</span><strong>Online</strong></li>
                <li><span>Certificado</span><strong>✅ Incluso</strong></li>
                <li><span>Matrículas</span><strong>${Number(c.matriculas).toLocaleString('pt-BR')}</strong></li>
              </ul>
            </div>
          </div>
        </div>
      </div>`;
  }).catch(() => {
    document.getElementById('page-content').innerHTML = `
      <div style="text-align:center;padding:5rem;color:var(--gray-400)">
        <div style="font-size:3rem">😕</div>
        <h3 style="color:var(--gray-600)">Curso não encontrado</h3>
        <a href="index.html" style="color:var(--indigo-500);font-weight:600">← Voltar</a>
      </div>`;
  });
</script>
</body>
</html>
